name: Deploy Public Lab

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://d449i4mct1wst.cloudfront.net
      AWS_REGION: us-west-2
      AWS_S3_BUCKET: jc-builds-public-lab-202343234967
      AWS_CLOUDFRONT_DISTRIBUTION_ID: E8FTV3JXMVFYG
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::202343234967:role/jc-builds-github-actions-deploy

      - name: Sync build output to S3
        run: aws s3 sync dist/ "s3://${AWS_S3_BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${AWS_CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
